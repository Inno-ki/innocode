name: desktop-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.235). Leave empty to use the ref tag."
        required: false

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
            electron_flag: "--mac --arm64"
            artifacts: |
              innocode-desktop-darwin-aarch64.dmg=*-mac-arm64.dmg
          - os: macos-14-large
            platform: macos-x64
            electron_flag: "--mac --x64"
            artifacts: |
              innocode-desktop-darwin-x64.dmg=*-mac-x64.dmg
          - os: windows-latest
            platform: windows-x64
            electron_flag: "--win --x64"
            artifacts: |
              innocode-desktop-windows-x64.exe=*-win-x64.exe
          - os: ubuntu-22.04
            platform: linux-x64
            electron_flag: "--linux"
            artifacts: |
              innocode-desktop-linux-amd64.AppImage=*.AppImage
              innocode-desktop-linux-amd64.deb=*.deb
              innocode-desktop-linux-x86_64.rpm=*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG}"
          if [[ -z "${tag}" && "${REF_NAME}" == v* ]]; then
            tag="${REF_NAME}"
          fi
          if [[ -z "${tag}" ]]; then
            tag=$(curl -fsSL "https://api.github.com/repos/Inno-ki/innocode/releases/latest" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+){2}([-.][A-Za-z0-9]+)*$ ]]; then
            echo "Refusing to use tag '${tag}': must look like vX.Y.Z[-suffix]" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Prepare desktop (icons + node bundle)
        working-directory: packages/desktop
        env:
          OPENCODE_CHANNEL: prod
          OPENCODE_VERSION: ${{ steps.release.outputs.version }}
        run: bun ./scripts/prepare.ts

      - name: Build desktop (electron-vite)
        working-directory: packages/desktop
        env:
          OPENCODE_CHANNEL: prod
          OPENCODE_VERSION: ${{ steps.release.outputs.version }}
          # the renderer bundle exceeds Node's default heap on the 7GB
          # macos-14 arm64 runners
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: bun run build

      # macOS signing + notarization run when the Apple secrets are set
      # (CSC_LINK etc.); without them the innocode config falls back to an
      # unsigned build. Secrets are gated to macOS runners so the Apple
      # cert never leaks into the Windows/Linux signing paths.
      - name: Package desktop (electron-builder)
        working-directory: packages/desktop
        env:
          OPENCODE_CHANNEL: prod
          OPENCODE_VERSION: ${{ steps.release.outputs.version }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
          ELECTRON_FLAG: ${{ matrix.electron_flag }}
        shell: bash
        run: |
          set -euo pipefail
          npx electron-builder ${ELECTRON_FLAG} \
            --publish never \
            --config electron-builder.innocode.config.ts

      - name: Collect and rename release assets
        shell: bash
        env:
          ARTIFACTS: ${{ matrix.artifacts }}
        run: |
          set -euo pipefail
          mkdir -p dist-out
          while IFS="=" read -r out pattern; do
            out=$(echo "${out}" | xargs)
            pattern=$(echo "${pattern}" | xargs)
            [[ -z "${out}" ]] && continue
            file=$(find packages/desktop/dist -maxdepth 1 -name "${pattern}" -type f | head -n 1)
            if [[ -z "${file}" ]]; then
              echo "Missing asset for pattern '${pattern}' in packages/desktop/dist:"
              ls -la packages/desktop/dist || true
              exit 1
            fi
            cp "${file}" "dist-out/${out}"
            echo "Renamed $(basename "${file}") -> ${out}"
          done <<< "${ARTIFACTS}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: dist-out/*
